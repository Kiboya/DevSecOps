apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root-policy
  annotations:
    policies.kyverno.io/title: Require Non-Root
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Containers must be required to run as non-root users. This
      policy enforces that the runAsNonRoot parameter is set to true in the
      securityContext at either the Pod or Container level.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-run-as-non-root
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - falco
              - kyverno
      validate:
        message: >-
          Running as root is not allowed. The containers must run as a non-root user.
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
            containers:
              - =(securityContext):
                  =(runAsNonRoot): true